name: Feature request
description: Suggest a component, interaction, lesson, or simulation improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or learning goal does this solve?
      placeholder: It is hard to see which way current is flowing...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the app do?
    validations:
      required: true
  - type: textarea
    id: interaction
    attributes:
      label: Interaction details
      description: Describe the expected UI behavior.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this is done?
      placeholder: |
        - Current dots animate only when the circuit is closed
        - Animation stops immediately when the switch opens
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Technical notes, constraints, or references.
