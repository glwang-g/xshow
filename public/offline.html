<!doctype html>
<html lang="zh-CN">
  <head>

    <title>xshow offline</title>
    <style>
      body {
        align-items: center;
        background: #f8fafc;
        color: #0f172a;
        display: flex;

        justify-content: center;
        margin: 0;
        min-height: 100vh;

    <main>
